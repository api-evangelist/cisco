    updated: '2026-05-04'
  - type: UseCases
    data:
      - name: Network Configuration Management
        description: Automate network device configuration changes across thousands of devices using APIs
          and templates.
      - name: Security Policy Automation
        description: Programmatically manage access control policies, security groups, and compliance
          enforcement.
      - name: Collaboration Integration
        description: Build bots, integrations, and custom applications on the Webex platform for team
          collaboration.
      - name: Cloud Infrastructure Management
        description: Manage hybrid cloud infrastructure with Intersight APIs for lifecycle management
          and workload optimization.
      - name: Network Monitoring and Analytics
        description: Collect and analyze network telemetry data for performance monitoring and troubleshooting.
  - type: Integrations
    data:
      - name: Ansible
        description: Network automation modules for Cisco platforms including IOS, NX-OS, ACI, and Meraki.
      - name: Terraform
        description: Terraform providers for Cisco ACI, Intersight, Meraki, and other platforms for infrastructure
          as code.
      - name: ServiceNow
        description: ITSM integration for automated incident management and change control with Cisco
          platforms.
      - name: Splunk
        description: Security and network analytics integration for log aggregation and threat detection.
      - name: Python
        description: Python SDKs and libraries for all major Cisco platforms including Meraki, Webex,
          and ACI.
