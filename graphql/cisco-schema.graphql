  ipPoolType: String
  usedPercentage: String
  usedIpAddressCount: Int
  availableIpAddressCount: Int
}

type Template {
  id: ID!
  name: String
  description: String
  composite: Boolean
  deviceTypes: [String]
  softwareType: String
  softwareVariant: String
  softwareVersion: [String]
  tags: [String]
  templateContent: String
  createTime: String
  lastUpdateTime: String
  projectId: String
  projectName: String
}

type TemplateProject {
  id: ID!
  name: String
  description: String
  tags: [String]
  templates: [Template]
  createTime: String
  lastUpdateTime: String
}

type Policy {
  id: ID!
  policyName: String
  policyType: String
  cfsChangeInfo: [String]
  customProvisions: [String]
  deletePolicyStatus: String
  exclusiveContract: String
  identitySource: String
  producer: String
  consumer: String
}

type QoSPolicy {
  id: ID!
  name: String
  description: String
  policyScope: String
  priority: String
  advancedPolicyScope: String
  exclusiveContract: String
  producer: String
  consumer: String
  createTime: String
  lastUpdateTime: String
}

type NetworkIssue {
  issueId: ID!
  name: String
  siteId: String
  deviceId: String
  deviceRole: String
  aiDriven: String
  clientMac: String
  issueOccurrenceCount: Int
  status: String
  priority: String
  category: String
  lastOccurrenceTime: String
}

type CommandRunner {
  command: String!
  deviceUuids: [String]!
  description: String
  timeout: Int
}

type Task {
  id: ID!
  data: String
  endTime: String
  errorCode: String
  errorKey: String
  failureReason: String
  isError: Boolean
  lastUpdate: String
  operationIdList: [String]
  parentId: String
  progress: String
  rootId: String
  serviceType: String
  startTime: String
  username: String
  version: Int
}

type FileInfo {
  id: ID!
  name: String
  size: Int
  nameSpace: String
  fileFormat: String
  md5Checksum: String
  sha1Checksum: String
  downloadPath: String
}

type NetworkTag {
  id: ID!
  name: String!
  description: String
  systemTag: Boolean
  dynamicRules: [String]
  instanceTenantId: String
}

type NetworkUser {
  id: ID!
  username: String
  role: String
  authSource: String
  passphraseUpdateTime: String
  passphraseUpdateTimeEpoch: String
  roleList: [NetworkRole]
}

type NetworkRole {
  roleId: ID!
  name: String
  description: String
  type: String
  resourceTypes: [String]
}

# ---------------------------------------------------------------------------
# NSO Types
# ---------------------------------------------------------------------------

type NSOService {
  name: ID!
  serviceType: String
  description: String
  status: String
  devices: [NSODevice]
  configuration: NSOConfiguration
  template: NSOTemplate
  lastModified: String
}

type NSODevice {
  name: ID!
  address: String
  port: Int
  authgroup: String
  deviceType: String
  nedId: String
  state: String
  syncStatus: NSOSync
  liveStatus: NSOLiveStatus
  modules: [NSOModule]
  configuration: NSOConfiguration
  cli: NSODeviceCLI
}

type NSODeviceGroup {
  name: ID!
  description: String
  deviceNames: [String]
  devices: [NSODevice]
}

type NSOConfiguration {
  path: String!
  value: String
  lastCommit: NSOCommit
  rollbacks: [NSORollback]
}

type NSORollback {
  id: ID!
  timestamp: String
  label: String
  comment: String
  creator: String
  type: String
  isUnsaved: Boolean
}

type NSOAlarm {
  id: ID!
  managed_device: String
  type: String
  specific_problem: String
  perceived_severity: String
  event_time: String
  alarm_text: String
  last_status_change: String
  is_cleared: Boolean
}

type NSOLiveStatus {
  deviceName: String!
  data: String
  timestamp: String
}

type NSOSync {
  deviceName: String!
  result: String
  info: String
  inSync: Boolean
}

type NSODeviceCLI {
  deviceName: String!
  output: String
  error: String
}

type NSOModule {
  name: ID!
  revision: String
  namespace: String
  prefix: String
  featureList: [String]
}

type NSOTemplate {
  name: ID!
  description: String
  variables: [String]
  deviceList: [String]
}

type NSOCommit {
  id: ID!
  timestamp: String
  user: String
  comment: String
  label: String
}

# ---------------------------------------------------------------------------
# Root Operations
# ---------------------------------------------------------------------------

type Query {
  # Meraki
  organization(id: ID!): Organization
  organizations: [Organization]
  network(id: ID!): Network
  networks(organizationId: ID!): [Network]
  device(serial: String!): Device
  devices(networkId: ID!): [Device]
  deviceStatuses(organizationId: ID!): [DeviceStatus]
  clients(networkId: ID!, timespan: Int): [Client]
  client(clientId: ID!, networkId: ID!): Client
  ssids(networkId: ID!): [SSID]
  vlans(networkId: ID!): [VLAN]
  firewall(networkId: ID!): MXFirewall
  securityEvents(networkId: ID!, timespan: Int): [SecurityEvent]
  inventory(organizationId: ID!): [Inventory]
  licenses(organizationId: ID!): [License]
  alerts(networkId: ID!): [Alert]

  # Webex
  room(id: ID!): Room
  rooms(teamId: String, type: String): [Room]
  message(id: ID!): Message
  messages(roomId: ID!): [Message]
  membership(id: ID!): Membership
  memberships(roomId: ID!): [Membership]
  team(id: ID!): Team
  teams: [Team]
  teamMemberships(teamId: ID!): [TeamMembership]
  meeting(id: ID!): Meeting
  meetings: [Meeting]
  recording(id: ID!): Recording
  recordings(meetingId: ID): [Recording]
  transcript(id: ID!): Transcript
  transcripts(meetingId: ID): [Transcript]
  webhooks: [Webhook]
  person(id: ID!): Person
  people(email: String, displayName: String): [Person]
  webexLicenses(orgId: ID!): [WebexLicense]
  webexEvents(resource: String, type: String): [WebexEvent]

  # Catalyst Center
  catalystDevice(id: ID!): CatalystDevice
  catalystDevices: [CatalystDevice]
  catalystInterface(id: ID!): CatalystInterface
  catalystInterfaces(deviceId: ID!): [CatalystInterface]
  topology: Topology
  pathTrace(id: ID!): PathTrace
  site(id: ID!): Site
  sites: [Site]
  building(id: ID!): Building
  floor(id: ID!): Floor
  ipPool(id: ID!): IPPool
  ipPools: [IPPool]
  template(id: ID!): Template
  templates(projectId: ID): [Template]
  templateProject(id: ID!): TemplateProject
  templateProjects: [TemplateProject]
  networkIssues(siteId: ID, priority: String): [NetworkIssue]
  task(id: ID!): Task
  networkTags: [NetworkTag]
  networkUsers: [NetworkUser]
  networkRoles: [NetworkRole]
  fileInfo(id: ID!): FileInfo

  # NSO
  nsoService(name: ID!): NSOService
  nsoServices: [NSOService]
  nsoDevice(name: ID!): NSODevice
  nsoDevices: [NSODevice]
  nsoDeviceGroup(name: ID!): NSODeviceGroup
  nsoDeviceGroups: [NSODeviceGroup]
  nsoAlarms: [NSOAlarm]
  nsoRollbacks: [NSORollback]
  nsoModule(name: ID!): NSOModule
  nsoModules(deviceName: ID!): [NSOModule]
}

type Mutation {
  # Meraki
  createNetwork(organizationId: ID!, name: String!, productTypes: [String]!): Network
  updateNetwork(id: ID!, name: String, timeZone: String, tags: [String]): Network
  deleteNetwork(id: ID!): Boolean
  claimDevice(networkId: ID!, serial: String!): Device
  updateDevice(serial: String!, name: String, tags: [String], notes: String): Device
  updateSSID(networkId: ID!, number: Int!, enabled: Boolean, name: String, psk: String): SSID
  createVlan(networkId: ID!, id: Int!, name: String!, applianceIp: String!, subnet: String!): VLAN
  updateVlan(networkId: ID!, vlanId: Int!, name: String, applianceIp: String, subnet: String): VLAN
  deleteVlan(networkId: ID!, vlanId: Int!): Boolean
  updateFirewallRules(networkId: ID!, rules: [String]!): MXFirewall

  # Webex
  createRoom(title: String!, teamId: String): Room
  updateRoom(id: ID!, title: String, isLocked: Boolean): Room
  deleteRoom(id: ID!): Boolean
  sendMessage(roomId: ID!, text: String, markdown: String, files: [String]): Message
  deleteMessage(id: ID!): Boolean
  createMembership(roomId: ID!, personEmail: String!, isModerator: Boolean): Membership
  deleteMembership(id: ID!): Boolean
  createTeam(name: String!): Team
  updateTeam(id: ID!, name: String!): Team
  deleteTeam(id: ID!): Boolean
  createMeeting(title: String!, start: String!, end: String!, invitees: [String]): Meeting
  updateMeeting(id: ID!, title: String, start: String, end: String): Meeting
  deleteMeeting(id: ID!): Boolean
  createWebhook(name: String!, targetUrl: String!, resource: String!, event: String!, secret: String): Webhook
  updateWebhook(id: ID!, name: String, targetUrl: String, status: String): Webhook
  deleteWebhook(id: ID!): Boolean
  createDeviceActivation(placeId: ID!): DeviceActivation

  # Catalyst Center
  runCommandRunner(command: CommandRunner!): Task
  createSite(name: String!, parentId: String, type: String!): Site
  updateSite(id: ID!, name: String): Site
  deleteSite(id: ID!): Task
  claimCatalystDevice(hostname: String!, ipAddress: String!): Task
  deleteNetworkTag(id: ID!): Boolean
  createNetworkTag(name: String!, description: String): NetworkTag
  deployTemplate(templateId: ID!, deviceId: ID!, parameters: String): Task
  createIPPool(name: String!, cidr: String!, gateway: String): IPPool
  deleteIPPool(id: ID!): Boolean

  # NSO
  syncNSODevice(name: ID!, direction: String!): NSOSync
  checkSyncNSODevice(name: ID!): NSOSync
  applyNSOTemplate(templateName: ID!, deviceNames: [String]!): Boolean
  rollbackNSOConfiguration(id: ID!): NSOCommit
  commitNSOConfiguration(comment: String, label: String): NSOCommit
  createNSOService(name: ID!, serviceType: String!, parameters: String): NSOService
  deleteNSOService(name: ID!): Boolean
}

type Subscription {
  # Meraki
  alertReceived(networkId: ID!): Alert
  deviceStatusChanged(organizationId: ID!): DeviceStatus
  clientConnected(networkId: ID!): Client

  # Webex
  messageCreated(roomId: ID!): Message
  membershipCreated(roomId: ID!): Membership
  meetingStarted: Meeting
  roomUpdated(roomId: ID!): Room

  # Catalyst Center
  issueDetected: NetworkIssue
  taskCompleted(id: ID!): Task
  deviceReachabilityChanged: CatalystDevice

  # NSO
  nsoAlarmRaised: NSOAlarm
  nsoSyncStatusChanged(deviceName: ID!): NSOSync
  nsoConfigurationChanged(path: String!): NSOConfiguration
}
