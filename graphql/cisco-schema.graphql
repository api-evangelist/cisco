type PathTrace {
  id: ID!
  sourceIP: String
  destIP: String
  sourcePort: String
  destPort: String
  protocol: String
  status: String
  lastUpdate: String
  networkElementsInfo: [String]
  properties: String
  request: String
}

type Site {
  id: ID!
  name: String
  siteNameHierarchy: String
  additionalInfo: [String]
  buildings: [Building]
  devices: [CatalystDevice]
}

type Building {
  id: ID!
  name: String
  siteId: String
  address: String
  latitude: Float
  longitude: Float
  country: String
  floors: [Floor]
}

type Floor {
  id: ID!
  name: String
  buildingId: String
  rfModel: String
  width: Float
  length: Float
  height: Float
  floorNumber: Int
}

type IPPool {
  id: ID!
