# Cisco Unified GraphQL Schema
# Covers: Meraki, Webex, Catalyst Center (DNA Center), NSO
# Source: https://developer.cisco.com/ | https://developer.webex.com/

# ---------------------------------------------------------------------------
# Shared / Root Types
# ---------------------------------------------------------------------------

enum SortOrder {
  ASC
  DESC
}

input TimeRange {
  startTime: String
  endTime: String
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int
}

type GeoLocation {
  lat: Float
  lng: Float
  address: String
  city: String
  country: String
}

type Annotation {
  id: ID!
  text: String
  createdBy: String
  createdAt: String
}

type AuditLog {
  id: ID!
  action: String!
  resource: String!
  resourceId: String
  performedBy: String
  timestamp: String!
  detail: String
}

type HealthScore {
  score: Int
  reason: String
  time: String
}

type TagLabel {
  name: String!
  value: String
}

type MetricDataPoint {
  timestamp: String!
  value: Float!
  unit: String
}

# ---------------------------------------------------------------------------
# Meraki Types
# ---------------------------------------------------------------------------

type Organization {
  id: ID!
  name: String!
  url: String
  samlEnabled: Boolean
  networks: [Network]
  licenses: [License]
  inventory: [Inventory]
  admins: [AdminUser]
  alerts: [Alert]
}

type Network {
  id: ID!
  organizationId: String!
  name: String!
  productTypes: [String]
  timeZone: String
  tags: [String]
  enrollmentString: String
  notes: String
  devices: [Device]
  clients: [Client]
  ssids: [SSID]
  vlans: [VLAN]
  trafficShaping: TrafficShaping
  contentFiltering: ContentFiltering
  firewall: MXFirewall
  alerts: [Alert]
}

type Device {
  serial: String!
  name: String
  model: String
  mac: String
  lanIp: String
  wan1Ip: String
  wan2Ip: String
  firmware: String
  networkId: String
  tags: [String]
  lat: Float
  lng: Float
  address: String
  notes: String
  status: DeviceStatus
}

type DeviceStatus {
  serial: String!
  name: String
  status: String
  lastReportedAt: String
  publicIp: String
  lanIp: String
  gateway: String
  ipType: String
  primaryDns: String
  secondaryDns: String
}

type Client {
  id: ID!
  mac: String!
  description: String
  ip: String
  ip6: String
  user: String
  vlan: String
  switchport: String
  status: String
  firstSeen: String
  lastSeen: String
  manufacturer: String
  os: String
  usage: ClientUsage
}

type ClientUsage {
  sent: Float
  recv: Float
}

type AccessPoint {
  serial: String!
  name: String
  model: String
  mac: String
  lanIp: String
  firmware: String
  networkId: String
  tags: [String]
  lat: Float
  lng: Float
  ssids: [SSID]
}

type Switch {
  serial: String!
  name: String
  model: String
  mac: String
  lanIp: String
  firmware: String
  networkId: String
  tags: [String]
  ports: [String]
}

type MXFirewall {
  networkId: String!
  settings: MXFirewallSettings
  l3Rules: [L3FirewallRule]
  l7Rules: [L7FirewallRule]
  securityEvents: [SecurityEvent]
}

type MXFirewallSettings {
  spoofingProtection: Boolean
  udpTimeoutSeconds: Int
  icmpTimeoutSeconds: Int
  tcpEstablishedTimeoutSeconds: Int
  tcpClosingTimeoutSeconds: Int
}

type SSID {
  number: Int!
  name: String
  enabled: Boolean
  authMode: String
  encryptionMode: String
  psk: String
  ipAssignmentMode: String
  useVlanTagging: Boolean
  defaultVlanId: Int
  visible: Boolean
  availableOnAllAps: Boolean
  bandSelection: String
  perClientBandwidthLimitUp: Int
  perClientBandwidthLimitDown: Int
}

type VLAN {
  id: ID!
  networkId: String!
  name: String
  applianceIp: String
  subnet: String
  fixedIpAssignments: String
  reservedIpRanges: [String]
  dnsNameservers: String
  dhcpHandling: String
  dhcpLeaseTime: String
}

type TrafficShaping {
  networkId: String!
  defaultRulesEnabled: Boolean
  rules: [FirewallRule]
}

type ContentFiltering {
  networkId: String!
  allowedUrlPatterns: [String]
  blockedUrlPatterns: [String]
  blockedUrlCategories: [String]
}

type FirewallRule {
  comment: String
  policy: String
  protocol: String
  destPort: String
  destCidr: String
  srcPort: String
  srcCidr: String
  syslogEnabled: Boolean
}

type L3FirewallRule {
  comment: String
  policy: String
  protocol: String
  destPort: String
  destCidr: String
  srcPort: String
  srcCidr: String
  syslogEnabled: Boolean
}

type L7FirewallRule {
  policy: String
  type: String
  value: String
}

type SecurityEvent {
  ts: String
  eventType: String
  srcIp: String
  destIp: String
  srcPort: Int
  destPort: Int
  protocol: String
  uri: String
  priority: String
  classification: String
  ruleId: String
  message: String
  signature: String
  sigSource: String
  blocked: Boolean
}

type Alert {
  id: ID!
  networkId: String
  type: String
  alertData: String
  sentAt: String
  severity: String
}

type Inventory {
  serial: String!
  mac: String
  model: String
  networkId: String
  orderNumber: String
  addedAt: String
  name: String
  tags: [String]
  licenseExpirationDate: String
}

type License {
  id: ID!
  licenseType: String
  licenseKey: String
  orderNumber: String
  deviceSerial: String
  networkId: String
  state: String
  seatCount: Int
  totalDurationInDays: Int
  durationInDays: Int
  permanentlyQueuedLicenses: [String]
  activationDate: String
  expirationDate: String
  headLicenseId: String
}

# ---------------------------------------------------------------------------
# Webex Types
# ---------------------------------------------------------------------------

type Room {
  id: ID!
  title: String
  type: String
  isLocked: Boolean
  teamId: String
  lastActivity: String
  creatorId: String
  created: String
  messages: [Message]
  memberships: [Membership]
}

type Message {
  id: ID!
  roomId: String!
  roomType: String
  text: String
  markdown: String
  html: String
  files: [String]
  personId: String
  personEmail: String
  mentionedPeople: [String]
  mentionedGroups: [String]
  attachments: [String]
  created: String
  updated: String
