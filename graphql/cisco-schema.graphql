}

type Membership {
  id: ID!
  roomId: String!
  personId: String
  personEmail: String
  personDisplayName: String
  personOrgId: String
  isModerator: Boolean
  isMonitor: Boolean
  isRoomHidden: Boolean
  created: String
}

type Team {
  id: ID!
  name: String
  creatorId: String
  created: String
  memberships: [TeamMembership]
  rooms: [Room]
}

type TeamMembership {
  id: ID!
  teamId: String!
  personId: String
  personEmail: String
  personDisplayName: String
  personOrgId: String
  isModerator: Boolean
  created: String
}

type Meeting {
  id: ID!
  meetingNumber: String
  title: String
  agenda: String
  password: String
  meetingType: String
  state: String
  timezone: String
  start: String
  end: String
  hostUserId: String
  hostEmail: String
  hostDisplayName: String
  webLink: String
  sipAddress: String
  dialInIpAddress: String
  enabledAutoRecordMeeting: Boolean
  invitees: [MeetingInvitee]
  recordings: [Recording]
}

type MeetingInvitee {
  id: ID!
  meetingId: String!
  email: String
  displayName: String
  coHost: Boolean
  host: Boolean
  panelist: Boolean
}

type Recording {
  id: ID!
  meetingId: String
  scheduledMeetingId: String
  topic: String
  createTime: String
  timeRecorded: String
  siteUrl: String
  downloadUrl: String
  playbackUrl: String
  password: String
  temporaryDirectDownloadLinks: String
  status: String
  durationSeconds: Int
  sizeBytes: Int
  shareToMe: Boolean
  transcript: Transcript
}

type Transcript {
  id: ID!
  meetingId: String
  scheduledMeetingId: String
  meetingSeriesId: String
  status: String
  startedAt: String
  endedAt: String
  siteUrl: String
  hostEmail: String
  snippet: String
}

type Webhook {
  id: ID!
  name: String
  targetUrl: String
  resource: String
  event: String
  orgId: String
  createdBy: String
  appId: String
  ownedBy: String
  status: String
  secret: String
  created: String
}

type Person {
  id: ID!
  emails: [String]
  phoneNumbers: [String]
  displayName: String
  nickName: String
  firstName: String
  lastName: String
  avatar: String
  orgId: String
  roles: [String]
  licenses: [String]
  department: String
  manager: String
  managerId: String
  siteUrls: [String]
  created: String
  lastModified: String
  lastActivity: String
  status: String
  invitePending: Boolean
  loginEnabled: Boolean
  type: String
}

type Bot {
  id: ID!
  emails: [String]
  displayName: String
  avatar: String
  orgId: String
  created: String
  type: String
}

type AdminUser {
  id: ID!
  name: String
  email: String
  orgId: String
  roles: [String]
  accountStatus: String
  lastActiveAt: String
}

type WebexLicense {
  id: ID!
  name: String
  totalUnits: Int
  consumedUnits: Int
  subscriptionId: String
  siteUrl: String
  siteType: String
}

type WebexEvent {
  id: ID!
  resource: String
  type: String
  appId: String
  actorId: String
  orgId: String
  created: String
  data: String
}

type DeviceActivation {
  id: ID!
  activationCode: String
  expiryTime: String
  placeId: String
}

# ---------------------------------------------------------------------------
# Catalyst Center / DNA Center Types
# ---------------------------------------------------------------------------

type CatalystDevice {
  id: ID!
  hostname: String
  managementIpAddress: String
  platformId: String
  softwareVersion: String
  softwareType: String
  collectionStatus: String
  reachabilityStatus: String
  reachabilityFailureReason: String
  errorCode: String
  errorDescription: String
  lastUpdated: String
  macAddress: String
  serialNumber: String
  upTime: String
  role: String
  family: String
  type: String
  location: String
  locationName: String
  description: String
  inventoryStatusDetail: String
  interfaces: [CatalystInterface]
  tags: [NetworkTag]
  healthScore: HealthScore
}

type CatalystInterface {
  id: ID!
  deviceId: String
  portName: String
  adminStatus: String
  operationalStatus: String
  interfaceType: String
  ipv4Address: String
  ipv4Mask: String
  isisSupport: String
  lastUpdated: String
  macAddress: String
  mappedPhysicalInterfaceId: String
  mappedPhysicalInterfaceName: String
  mediaType: String
  nativeVlanId: String
  ospfSupport: String
  pid: String
  portMode: String
  portType: String
  serialNo: String
  series: String
  speed: String
  status: String
  vlanId: String
  voiceVlan: String
}

type Topology {
  nodes: [TopologyNode]
  links: [TopologyLink]
}

type TopologyNode {
  id: ID!
  label: String
  ip: String
  deviceType: String
  platformId: String
  family: String
  role: String
  softwareVersion: String
  nodeType: String
  fixed: Boolean
  additionalInfo: String
  tags: [String]
  upperNode: String
  x: Float
  y: Float
}

type TopologyLink {
  source: String
  target: String
  id: ID!
  startPortID: String
  endPortID: String
  startPortName: String
  endPortName: String
  startPortSpeed: String
  endPortSpeed: String
  greyOut: Boolean
  linkStatus: String
  additionalInfo: String
