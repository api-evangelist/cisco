naftiko: 1.0.0-alpha2
info:
  label: Cisco Meraki Dashboard API — Organizations
  description: 'Cisco Meraki Dashboard API — Organizations. 1 operations. Lead operation: Cisco Meraki List Organizations.
    Self-contained Naftiko capability covering one Cisco business surface.'
  tags:
  - Cisco
  - Organizations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_API_KEY: CISCO_API_KEY
capability:
  consumes:
  - type: http
    namespace: meraki-organizations
    baseUri: https://api.meraki.com/api/v1
    description: Cisco Meraki Dashboard API — Organizations business capability. Self-contained, no shared references.
    resources:
    - name: organizations
      path: /organizations
      operations:
      - name: getorganizations
        method: GET
        description: Cisco Meraki List Organizations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Cisco-Meraki-API-Key
      value: '{{env.CISCO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: meraki-organizations-rest
    port: 8080
    description: REST adapter for Cisco Meraki Dashboard API — Organizations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/organizations
      name: organizations
      description: REST surface for organizations.
      operations:
      - method: GET
        name: getorganizations
        description: Cisco Meraki List Organizations
        call: meraki-organizations.getorganizations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: meraki-organizations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Meraki Dashboard API — Organizations. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cisco-meraki-list-organizations
      description: Cisco Meraki List Organizations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: meraki-organizations.getorganizations
      outputParameters:
      - type: object
        mapping: $.
