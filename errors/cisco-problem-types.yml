problems:
  - status: 400
    title: Bad Request
    meaning: Malformed request, invalid parameters, or validation failure.
    remediation: Check request body/query parameters against the operation schema.
  - status: 401
    title: Unauthorized
    meaning: Missing or invalid API key / OAuth token.
    remediation: Provide a valid X-Cisco-Meraki-API-Key header or OAuth bearer token.
    source_operation: openapi/cisco-meraki-api.yaml#getOrganizations
  - status: 403
    title: Forbidden
    meaning: Authenticated but not authorized for the target organization/network resource.
    remediation: Ensure the key's account has privileges on the organization.
  - status: 404
    title: Not Found
    meaning: Resource (organization, network, device) does not exist or is not visible to the key.
    remediation: Verify the resource id and account scope.
  - status: 429
    title: Too Many Requests
    meaning: Per-organization rate limit exceeded (default 10 requests/second).
    remediation: Honor the Retry-After header and back off; see rate-limits/cisco-rate-limits.yml.
  - status: 500
    title: Internal Server Error
    meaning: Unexpected server-side error.
    remediation: Retry with backoff; contact Meraki support if persistent.
